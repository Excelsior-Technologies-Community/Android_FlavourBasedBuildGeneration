name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test All Flavours
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Run unit tests for dev
        run: ./gradlew testDevDebugUnitTest
      
      - name: Run unit tests for staging
        run: ./gradlew testStagingDebugUnitTest
      
      - name: Run unit tests for prod
        run: ./gradlew testProdDebugUnitTest
      
      - name: Run lint
        run: ./gradlew lint
      
      - name: Run detekt
        run: ./gradlew detekt
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/test-results/
      
      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: app/build/reports/lint-*
      
      - name: Upload detekt reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: app/build/reports/detekt/

  build:
    name: Build Debug APKs
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Build dev debug APK
        run: ./gradlew assembleDevDebug
      
      - name: Build staging debug APK
        run: ./gradlew assembleStagingDebug
      
      - name: Build prod debug APK
        run: ./gradlew assembleProdDebug
      
      - name: Upload dev APK
        uses: actions/upload-artifact@v4
        with:
          name: dev-debug-apk
          path: app/build/outputs/apk/dev/debug/app-dev-debug.apk
      
      - name: Upload staging APK
        uses: actions/upload-artifact@v4
        with:
          name: staging-debug-apk
          path: app/build/outputs/apk/staging/debug/app-staging-debug.apk
      
      - name: Upload prod APK
        uses: actions/upload-artifact@v4
        with:
          name: prod-debug-apk
          path: app/build/outputs/apk/prod/debug/app-prod-debug.apk
