name: Android CI/CD - Play Store Release

permissions:
  contents: write
  secrets: write

on:
  push:
    branches:
      - main
      - test
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track (internal, alpha, beta, production)'
        required: false
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      rollout:
        description: 'Rollout percentage for production (0.01 to 1.0)'
        required: false
        default: '1.0'
      changelog:
        description: 'Release changelog'
        required: false
        default: 'Automated release from CI/CD pipeline'

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
  RUBY_VERSION: '3.2'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Install Fastlane
        run: |
          gem install fastlane -NV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/your_keystore.jks

      - name: Decode Play Store JSON Key
        run: |
          echo "${{ secrets.PLAY_JSON_KEY_DATA }}" > play-store-service-account.json

      - name: Generate unique version code
        id: version
        run: |
          # Read current version from secret or initialize
          CURRENT_VERSION_CODE="${{ secrets.VERSION_CODE }}"
          CURRENT_VERSION_NAME="${{ secrets.VERSION_NAME }}"
          
          if [ -z "$CURRENT_VERSION_CODE" ]; then
            CURRENT_VERSION_CODE=0
          fi
          if [ -z "$CURRENT_VERSION_NAME" ]; then
            CURRENT_VERSION_NAME="1.0.0"
          fi
          
          echo "Current version code: $CURRENT_VERSION_CODE"
          echo "Current version name: $CURRENT_VERSION_NAME"
          
          # Increment version code
          NEW_VERSION_CODE=$((CURRENT_VERSION_CODE + 1))
          
          # Increment patch version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION_NAME"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION_NAME="${MAJOR}.${MINOR}.${NEW_PATCH}"
          
          echo "VERSION_CODE=$NEW_VERSION_CODE" >> $GITHUB_OUTPUT
          echo "VERSION_NAME=$NEW_VERSION_NAME" >> $GITHUB_OUTPUT
          echo "NEW_VERSION_CODE=$NEW_VERSION_CODE" >> $GITHUB_OUTPUT
          echo "NEW_VERSION_NAME=$NEW_VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Generated version code: $NEW_VERSION_CODE"
          echo "Generated version name: $NEW_VERSION_NAME"

      - name: Update version secrets
        uses: hmanzur/actions-set-secret@v2.1.0
        with:
          name: 'VERSION_CODE'
          value: ${{ steps.version.outputs.NEW_VERSION_CODE }}
          repository: ${{ github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update version name secret
        uses: hmanzur/actions-set-secret@v2.1.0
        with:
          name: 'VERSION_NAME'
          value: ${{ steps.version.outputs.NEW_VERSION_NAME }}
          repository: ${{ github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build AAB (Production)
        env:
          KEYSTORE_PATH: "your_keystore.jks"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
          VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
        run: |
          ./gradlew bundleProdRelease --stacktrace

      - name: Verify AAB exists
        run: |
          AAB_PATH="app/build/outputs/bundle/prodRelease/app-prod-release.aab"
          if [ ! -f "$AAB_PATH" ]; then
            echo "Error: AAB file not found at $AAB_PATH"
            exit 1
          fi
          echo "AAB file found successfully"
          ls -lh "$AAB_PATH"

      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-prod-release-${{ steps.version.outputs.VERSION_CODE }}
          path: app/build/outputs/bundle/prodRelease/app-prod-release.aab
          retention-days: 30

      - name: Deploy to Play Store
        env:
          PLAY_JSON_KEY_PATH: "play-store-service-account.json"
          CHANGELOG: ${{ github.event.inputs.changelog || 'Automated release from CI/CD pipeline' }}
          ROLLOUT_PERCENT: ${{ github.event.inputs.rollout || '1.0' }}
        run: |
          TRACK="${{ github.event.inputs.track || 'internal' }}"
          echo "Deploying to track: $TRACK"
          
          case $TRACK in
            internal)
              fastlane deploy_internal
              ;;
            alpha)
              fastlane deploy_alpha
              ;;
            beta)
              fastlane deploy_beta
              ;;
            production)
              fastlane deploy_production
              ;;
            *)
              echo "Invalid track specified, defaulting to internal"
              fastlane deploy_internal
              ;;
          esac

      - name: Notify deployment status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Deployment successful to ${{ github.event.inputs.track || 'internal' }} track"
            echo "Version: ${{ steps.version.outputs.VERSION_NAME }}"
          else
            echo "❌ Deployment failed"
            exit 1
          fi
