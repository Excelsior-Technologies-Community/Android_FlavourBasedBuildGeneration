name: Android CI/CD - Play Store Release

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - test
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track (internal, alpha, beta, production)'
        required: false
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      rollout:
        description: 'Rollout percentage for production (0.01 to 1.0)'
        required: false
        default: '1.0'
      changelog:
        description: 'Release changelog'
        required: false
        default: 'Automated release from CI/CD pipeline'

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
  RUBY_VERSION: '3.2'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Install Fastlane
        run: |
          gem install fastlane -NV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/your_keystore.jks

      - name: Create Play Store JSON Key
        run: |
          # Use dummy JSON key for testing (base64 encoded to avoid YAML issues)
          echo '' | base64 -d > fastlane/play-store-service-account.json
          echo "Created dummy JSON key file in fastlane directory for testing"

      - name: Generate unique version code
        id: version
        run: |
          # Read current version from current branch
          if [ -f ".version" ]; then
            CURRENT_VERSION=$(cat .version)
            echo "Current version: $CURRENT_VERSION"
          else
            CURRENT_VERSION="1.0.0"
            echo "Initializing version: $CURRENT_VERSION"
          fi
          
          if [ -f ".versioncode" ]; then
            CURRENT_VERSION_CODE=$(cat .versioncode)
            echo "Current version code: $CURRENT_VERSION_CODE"
          else
            CURRENT_VERSION_CODE=0
            echo "Initializing version code: $CURRENT_VERSION_CODE"
          fi
          
          # Increment patch version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          
          # Increment version code
          NEW_VERSION_CODE=$((CURRENT_VERSION_CODE + 1))
          
          # Write new version to files
          echo "$NEW_VERSION" > .version
          echo "$NEW_VERSION_CODE" > .versioncode
          
          echo "VERSION_CODE=$NEW_VERSION_CODE" >> $GITHUB_OUTPUT
          echo "VERSION_NAME=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Generated version code: $NEW_VERSION_CODE"
          echo "Generated version name: $NEW_VERSION"

      - name: Commit and push version files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .version .versioncode
          git commit -m "Bump version to ${{ steps.version.outputs.VERSION_NAME }}"
          git push

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run Unit Tests
        run: ./gradlew test

      - name: Run Detekt (Static Analysis)
        run: ./gradlew detekt

      - name: Run Lint
        run: ./gradlew lint

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            app/build/test-results
            app/build/reports/tests
          retention-days: 30

      - name: Upload Detekt Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: |
            app/build/reports/detekt
          retention-days: 30

      - name: Upload Lint Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            app/build/reports/lint
          retention-days: 30

      - name: Run Instrumented Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          script: ./gradlew connectedAndroidTest

      - name: Upload Instrumented Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-reports
          path: |
            app/build/reports/androidTests
          retention-days: 30

      - name: Run UI Tests
        run: ./gradlew connectedDebugAndroidTest

      - name: Upload UI Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-reports
          path: |
            app/build/reports/androidTests
          retention-days: 30

      - name: Upload Crash Reports
        run: |
          # Integrate with Firebase Crashlytics, Sentry, or Bugsnag
          # Automatically collect crash reports
          # Categorize crashes by type
          echo "Crash reporting integration placeholder"
          echo "To enable crash reporting, configure:"
          echo "  - Firebase Crashlytics: Add google-services.json and firebase-crashlytics plugin"
          echo "  - Sentry: Add Sentry SDK and DSN"
          echo "  - Bugsnag: Add Bugsnag SDK and API key"

      - name: Build AAB (Dev)
        env:
          KEYSTORE_PATH: "your_keystore.jks"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
          VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
        run: |
          ./gradlew bundleDevRelease --stacktrace

      - name: Build AAB (Staging)
        env:
          KEYSTORE_PATH: "your_keystore.jks"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
          VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
        run: |
          ./gradlew bundleStagingRelease --stacktrace

      - name: Build AAB (Production)
        env:
          KEYSTORE_PATH: "your_keystore.jks"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
          VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
        run: |
          ./gradlew bundleProdRelease --stacktrace

      - name: Verify AABs exist
        run: |
          for flavor in dev staging prod; do
            AAB_PATH="app/build/outputs/bundle/${flavor}Release/app-${flavor}-release.aab"
            if [ ! -f "$AAB_PATH" ]; then
              echo "Error: AAB file not found at $AAB_PATH"
              exit 1
            fi
            echo "AAB file found successfully: $AAB_PATH"
            ls -lh "$AAB_PATH"
          done

      - name: Upload AABs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ steps.version.outputs.VERSION_CODE }}
          path: |
            app/build/outputs/bundle/devRelease/app-dev-release.aab
            app/build/outputs/bundle/stagingRelease/app-staging-release.aab
            app/build/outputs/bundle/prodRelease/app-prod-release.aab
          retention-days: 30

      - name: Deploy Dev to Play Store
        env:
          PLAY_JSON_KEY_PATH: "fastlane/play-store-service-account.json"
        run: |
          cd fastlane
          fastlane deploy_dev

      - name: Deploy Staging to Play Store
        env:
          PLAY_JSON_KEY_PATH: "fastlane/play-store-service-account.json"
        run: |
          cd fastlane
          fastlane deploy_staging

      - name: Deploy Production to Play Store
        env:
          PLAY_JSON_KEY_PATH: "fastlane/play-store-service-account.json"
          CHANGELOG: ${{ github.event.inputs.changelog || 'Automated release from CI/CD pipeline' }}
          ROLLOUT_PERCENT: ${{ github.event.inputs.rollout || '1.0' }}
        run: |
          TRACK="${{ github.event.inputs.track || 'internal' }}"
          echo "Deploying to track: $TRACK"
          
          case $TRACK in
            internal)
              fastlane deploy_internal
              ;;
            alpha)
              fastlane deploy_alpha
              ;;
            beta)
              fastlane deploy_beta
              ;;
            production)
              fastlane deploy_production
              ;;
            *)
              echo "Invalid track specified, defaulting to internal"
              fastlane deploy_internal
              ;;
          esac

      - name: Notify deployment status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Deployment successful to ${{ github.event.inputs.track || 'internal' }} track"
            echo "Version: ${{ steps.version.outputs.VERSION_NAME }}"
          else
            echo "❌ Deployment failed"
            exit 1
          fi
