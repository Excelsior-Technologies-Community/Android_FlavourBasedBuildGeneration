name: Android CI/CD - Test Build

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - test
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/your_keystore.jks

      - name: Read current version
        id: version
        run: |
          # Read current version from current branch (no increment for test builds)
          if [ -f ".version" ]; then
            CURRENT_VERSION=$(cat .version)
            echo "Current version: $CURRENT_VERSION"
          else
            CURRENT_VERSION="1.0.0"
            echo "Initializing version: $CURRENT_VERSION"
          fi
          
          if [ -f ".versioncode" ]; then
            CURRENT_VERSION_CODE=$(cat .versioncode)
            echo "Current version code: $CURRENT_VERSION_CODE"
          else
            CURRENT_VERSION_CODE=0
            echo "Initializing version code: $CURRENT_VERSION_CODE"
          fi
          
          echo "VERSION_CODE=$CURRENT_VERSION_CODE" >> $GITHUB_OUTPUT
          echo "VERSION_NAME=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Using version code: $CURRENT_VERSION_CODE"
          echo "Using version name: $CURRENT_VERSION"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run Unit Tests - Dev Flavor
        run: ./gradlew testDevDebugUnitTest || true

      - name: Run Unit Tests - Staging Flavor
        run: ./gradlew testStagingDebugUnitTest || true

      - name: Run Unit Tests - Prod Flavor
        run: ./gradlew testProdDebugUnitTest || true

      - name: Run Detekt (Static Analysis)
        run: ./gradlew detekt

      - name: Run Lint - Dev Flavor
        run: ./gradlew lintDevDebug || true

      - name: Run Lint - Staging Flavor
        run: ./gradlew lintStagingDebug || true

      - name: Run Lint - Prod Flavor
        run: ./gradlew lintProdDebug || true

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            app/build/test-results
            app/build/reports/tests
          retention-days: 30

      - name: Upload Detekt Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: |
            app/build/reports/detekt
          retention-days: 30

      - name: Upload Lint Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            app/build/reports/lint-results-*.html
            app/build/reports/lint-results-*.xml
          retention-days: 30
          if-no-files-found: warn

      - name: Generate Error Summary
        if: always()
        run: |
          echo "## 📊 ERROR SUMMARY REPORT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Unit Test Results" >> $GITHUB_STEP_SUMMARY
          if [ -d "app/build/test-results" ]; then
            echo "✅ Unit test reports available" >> $GITHUB_STEP_SUMMARY
            find app/build/test-results -name "*.xml" -exec echo "- {}" \; >> $GITHUB_STEP_SUMMARY || true
          else
            echo "❌ No unit test results found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Detekt Results" >> $GITHUB_STEP_SUMMARY
          if [ -d "app/build/reports/detekt" ]; then
            echo "✅ Detekt reports available" >> $GITHUB_STEP_SUMMARY
            find app/build/reports/detekt -name "*.html" -o -name "*.xml" | head -20 >> $GITHUB_STEP_SUMMARY || true
          else
            echo "❌ No Detekt results found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Lint Results" >> $GITHUB_STEP_SUMMARY
          if [ -d "app/build/reports/lint-results" ]; then
            echo "✅ Lint reports available" >> $GITHUB_STEP_SUMMARY
            find app/build/reports/lint-results -name "*.html" -o -name "*.xml" | head -20 >> $GITHUB_STEP_SUMMARY || true
          else
            echo "❌ No Lint results found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Run Instrumented Tests - Dev Flavor
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: default
          arch: x86_64
          script: ./gradlew connectedDevDebugAndroidTest || true

      - name: Run Instrumented Tests - Staging Flavor
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: default
          arch: x86_64
          script: ./gradlew connectedStagingDebugAndroidTest || true

      - name: Run Instrumented Tests - Prod Flavor
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: default
          arch: x86_64
          script: ./gradlew connectedProdDebugAndroidTest || true

      - name: Upload Instrumented Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-reports
          path: |
            app/build/reports/androidTests
          retention-days: 30
          if-no-files-found: warn

      - name: Generate Detailed Error Report
        if: always()
        run: |
          echo "## 📋 DETAILED ERROR REPORT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Unit Test Failures
          echo "### ❌ Unit Test Failures" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "#### 📝 Error Explanation" >> $GITHUB_STEP_SUMMARY
          echo "This XML report contains unit test results. Key information:" >> $GITHUB_STEP_SUMMARY
          echo "- **testcase**: Individual test method that ran" >> $GITHUB_STEP_SUMMARY
          echo "- **failure**: Test failed with assertion error" >> $GITHUB_STEP_SUMMARY
          echo "- **error**: Test threw an exception" >> $GITHUB_STEP_SUMMARY
          echo "- **message**: Human-readable error description" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 💡 Fix Suggestions" >> $GITHUB_STEP_SUMMARY
          echo "- Review the assertion message to understand what failed" >> $GITHUB_STEP_SUMMARY
          echo "- Check the test logic for incorrect assertions" >> $GITHUB_STEP_SUMMARY
          echo "- Verify the code being tested is working correctly" >> $GITHUB_STEP_SUMMARY
          echo "- Check for null pointer exceptions" >> $GITHUB_STEP_SUMMARY
          echo "- Verify test data and mock objects" >> $GITHUB_STEP_SUMMARY
          echo "- Check for proper test setup and initialization" >> $GITHUB_STEP_SUMMARY
          echo "- If intentional test failure, remove or fix the test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Dev Flavor
          echo "<details><summary>🔵 Dev Flavor Unit Test Results (Click to expand)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "app/build/test-results/testDevDebugUnitTest" ]; then
            echo "##### 📄 Dev Flavor Test Reports:" >> $GITHUB_STEP_SUMMARY
            for file in app/build/test-results/testDevDebugUnitTest/**/*.xml; do
              if [ -f "$file" ]; then
                echo "###### File: $file" >> $GITHUB_STEP_SUMMARY
                echo '```xml' >> $GITHUB_STEP_SUMMARY
                head -100 "$file" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
              fi
            done
          else
            echo "No Dev flavor unit test results found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Staging Flavor
          echo "<details><summary>🟡 Staging Flavor Unit Test Results (Click to expand)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "app/build/test-results/testStagingDebugUnitTest" ]; then
            echo "##### 📄 Staging Flavor Test Reports:" >> $GITHUB_STEP_SUMMARY
            for file in app/build/test-results/testStagingDebugUnitTest/**/*.xml; do
              if [ -f "$file" ]; then
                echo "###### File: $file" >> $GITHUB_STEP_SUMMARY
                echo '```xml' >> $GITHUB_STEP_SUMMARY
                head -100 "$file" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
              fi
            done
          else
            echo "No Staging flavor unit test results found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Prod Flavor
          echo "<details><summary>🔴 Prod Flavor Unit Test Results (Click to expand)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "app/build/test-results/testProdDebugUnitTest" ]; then
            echo "##### 📄 Prod Flavor Test Reports:" >> $GITHUB_STEP_SUMMARY
            for file in app/build/test-results/testProdDebugUnitTest/**/*.xml; do
              if [ -f "$file" ]; then
                echo "###### File: $file" >> $GITHUB_STEP_SUMMARY
                echo '```xml' >> $GITHUB_STEP_SUMMARY
                head -100 "$file" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
              fi
            done
          else
            echo "No Prod flavor unit test results found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Detekt Issues
          echo "### 🔍 Detekt Issues" >> $GITHUB_STEP_SUMMARY
          if [ -f "app/build/reports/detekt/detekt.xml" ]; then
            echo "#### 📝 Error Explanation" >> $GITHUB_STEP_SUMMARY
            echo "Detekt reports code quality issues. Key information:" >> $GITHUB_STEP_SUMMARY
            echo "- **rule**: Which Detekt rule was violated" >> $GITHUB_STEP_SUMMARY
            echo "- **file**: Source file with the issue" >> $GITHUB_STEP_SUMMARY
            echo "- **line**: Line number where issue occurs" >> $GITHUB_STEP_SUMMARY
            echo "- **message**: Description of the code quality issue" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### 💡 Fix Suggestions" >> $GITHUB_STEP_SUMMARY
            echo "- Refactor code to follow Kotlin best practices" >> $GITHUB_STEP_SUMMARY
            echo "- Remove unused code or imports" >> $GITHUB_STEP_SUMMARY
            echo "- Simplify complex functions" >> $GITHUB_STEP_SUMMARY
            echo "- Add proper documentation" >> $GITHUB_STEP_SUMMARY
            echo "- Fix naming conventions" >> $GITHUB_STEP_SUMMARY
            echo "- Reduce code duplication" >> $GITHUB_STEP_SUMMARY
            echo "- Improve code readability" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### 📄 Detailed Error Reports:" >> $GITHUB_STEP_SUMMARY
            echo '```xml' >> $GITHUB_STEP_SUMMARY
            head -100 app/build/reports/detekt/detekt.xml >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          else
            echo "No Detekt XML report found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Lint Issues
          echo "### 🧹 Lint Issues" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "#### 📝 Error Explanation" >> $GITHUB_STEP_SUMMARY
          echo "Android Lint reports code structure and compatibility issues. Key information:" >> $GITHUB_STEP_SUMMARY
          echo "- **issue**: Type of lint issue (e.g., NewApi, UnusedResources)" >> $GITHUB_STEP_SUMMARY
          echo "- **location**: File and line where issue occurs" >> $GITHUB_STEP_SUMMARY
          echo "- **message**: Description of the issue" >> $GITHUB_STEP_SUMMARY
          echo "- **severity**: Error, Warning, or Info" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 💡 Fix Suggestions" >> $GITHUB_STEP_SUMMARY
          echo "- Add API level checks for new APIs" >> $GITHUB_STEP_SUMMARY
          echo "- Remove unused resources" >> $GITHUB_STEP_SUMMARY
          echo "- Fix manifest declarations" >> $GITHUB_STEP_SUMMARY
          echo "- Add proper permissions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Dev Flavor
          echo "<details><summary>🔵 Dev Flavor Lint Results (Click to expand)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "app/build/reports/lint-results-devDebug.xml" ]; then
            echo "##### 📄 Dev Flavor Lint Report:" >> $GITHUB_STEP_SUMMARY
            echo '```xml' >> $GITHUB_STEP_SUMMARY
            head -100 app/build/reports/lint-results-devDebug.xml >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No Dev flavor lint results found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Staging Flavor
          echo "<details><summary>� Staging Flavor Lint Results (Click to expand)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "app/build/reports/lint-results-stagingDebug.xml" ]; then
            echo "##### 📄 Staging Flavor Lint Report:" >> $GITHUB_STEP_SUMMARY
            echo '```xml' >> $GITHUB_STEP_SUMMARY
            head -100 app/build/reports/lint-results-stagingDebug.xml >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No Staging flavor lint results found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Prod Flavor
          echo "<details><summary>🔴 Prod Flavor Lint Results (Click to expand)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "app/build/reports/lint-results-prodDebug.xml" ]; then
            echo "##### � Prod Flavor Lint Report:" >> $GITHUB_STEP_SUMMARY
            echo '```xml' >> $GITHUB_STEP_SUMMARY
            head -100 app/build/reports/lint-results-prodDebug.xml >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No Prod flavor lint results found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Instrumented Test Failures
          echo "### 📱 Instrumented Test Failures" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "#### 📝 Error Explanation" >> $GITHUB_STEP_SUMMARY
          echo "Instrumented tests run on Android device/emulator. Key information:" >> $GITHUB_STEP_SUMMARY
          echo "- **testcase**: Test class and method name" >> $GITHUB_STEP_SUMMARY
          echo "- **failure**: Assertion that failed" >> $GITHUB_STEP_SUMMARY
          echo "- **stacktrace**: Full error stack trace" >> $GITHUB_STEP_SUMMARY
          echo "- **message**: Human-readable error message" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 💡 Fix Suggestions" >> $GITHUB_STEP_SUMMARY
          echo "- Check the test assertion logic" >> $GITHUB_STEP_SUMMARY
          echo "- Verify UI elements exist and are accessible" >> $GITHUB_STEP_SUMMARY
          echo "- Ensure proper test setup and teardown" >> $GITHUB_STEP_SUMMARY
          echo "- Review activity lifecycle in tests" >> $GITHUB_STEP_SUMMARY
          echo "- Check for proper Espresso view interactions" >> $GITHUB_STEP_SUMMARY
          echo "- Verify test runs on correct API level" >> $GITHUB_STEP_SUMMARY
          echo "- Check flavor-specific configurations" >> $GITHUB_STEP_SUMMARY
          echo "- If intentional error (like testIntentionalError), remove the test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Dev Flavor
          echo "<details><summary>🔵 Dev Flavor Results (Click to expand)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "app/build/reports/androidTests/connected/dev/debug" ]; then
            echo "##### 📄 Dev Flavor Test Reports:" >> $GITHUB_STEP_SUMMARY
            for file in app/build/reports/androidTests/connected/dev/debug/**/*.xml; do
              if [ -f "$file" ]; then
                echo "###### File: $file" >> $GITHUB_STEP_SUMMARY
                echo '```xml' >> $GITHUB_STEP_SUMMARY
                head -100 "$file" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
              fi
            done
          else
            echo "No Dev flavor test results found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Staging Flavor
          echo "<details><summary>🟡 Staging Flavor Results (Click to expand)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "app/build/reports/androidTests/connected/staging/debug" ]; then
            echo "##### 📄 Staging Flavor Test Reports:" >> $GITHUB_STEP_SUMMARY
            for file in app/build/reports/androidTests/connected/staging/debug/**/*.xml; do
              if [ -f "$file" ]; then
                echo "###### File: $file" >> $GITHUB_STEP_SUMMARY
                echo '```xml' >> $GITHUB_STEP_SUMMARY
                head -100 "$file" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
              fi
            done
          else
            echo "No Staging flavor test results found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Prod Flavor
          echo "<details><summary>🔴 Prod Flavor Results (Click to expand)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "app/build/reports/androidTests/connected/prod/debug" ]; then
            echo "##### 📄 Prod Flavor Test Reports:" >> $GITHUB_STEP_SUMMARY
            for file in app/build/reports/androidTests/connected/prod/debug/**/*.xml; do
              if [ -f "$file" ]; then
                echo "###### File: $file" >> $GITHUB_STEP_SUMMARY
                echo '```xml' >> $GITHUB_STEP_SUMMARY
                head -100 "$file" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
              fi
            done
          else
            echo "No Prod flavor test results found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Run UI Tests - Dev Flavor
        continue-on-error: true
        run: ./gradlew connectedDevDebugAndroidTest || true

      - name: Run UI Tests - Staging Flavor
        continue-on-error: true
        run: ./gradlew connectedStagingDebugAndroidTest || true

      - name: Run UI Tests - Prod Flavor
        continue-on-error: true
        run: ./gradlew connectedProdDebugAndroidTest || true

      - name: Upload UI Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-reports
          path: |
            app/build/reports/androidTests
          retention-days: 30
          if-no-files-found: warn

      - name: Generate UI Test Error Report
        if: always()
        run: |
          echo "## 📱 UI Test Failures" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "#### 📝 Error Explanation" >> $GITHUB_STEP_SUMMARY
          echo "UI tests verify app UI components and interactions. Key information:" >> $GITHUB_STEP_SUMMARY
          echo "- **testcase**: Test class and method name" >> $GITHUB_STEP_SUMMARY
          echo "- **failure**: UI assertion that failed" >> $GITHUB_STEP_SUMMARY
          echo "- **stacktrace**: Full error stack trace" >> $GITHUB_STEP_SUMMARY
          echo "- **message**: Human-readable error message" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 💡 Fix Suggestions" >> $GITHUB_STEP_SUMMARY
          echo "- Check if UI elements exist in the layout" >> $GITHUB_STEP_SUMMARY
          echo "- Verify element IDs match test expectations" >> $GITHUB_STEP_SUMMARY
          echo "- Ensure proper Espresso view interactions" >> $GITHUB_STEP_SUMMARY
          echo "- Check activity/view state during test" >> $GITHUB_STEP_SUMMARY
          echo "- If intentional error (like testIntentionalError), remove the test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Dev Flavor
          echo "<details><summary>🔵 Dev Flavor UI Results (Click to expand)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "app/build/reports/androidTests/connected/dev/debug" ]; then
            echo "##### 📄 Dev Flavor UI Test Reports:" >> $GITHUB_STEP_SUMMARY
            for file in app/build/reports/androidTests/connected/dev/debug/**/*.xml; do
              if [ -f "$file" ]; then
                echo "###### File: $file" >> $GITHUB_STEP_SUMMARY
                echo '```xml' >> $GITHUB_STEP_SUMMARY
                head -100 "$file" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
              fi
            done
          else
            echo "No Dev flavor UI test results found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Staging Flavor
          echo "<details><summary>🟡 Staging Flavor UI Results (Click to expand)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "app/build/reports/androidTests/connected/staging/debug" ]; then
            echo "##### 📄 Staging Flavor UI Test Reports:" >> $GITHUB_STEP_SUMMARY
            for file in app/build/reports/androidTests/connected/staging/debug/**/*.xml; do
              if [ -f "$file" ]; then
                echo "###### File: $file" >> $GITHUB_STEP_SUMMARY
                echo '```xml' >> $GITHUB_STEP_SUMMARY
                head -100 "$file" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
              fi
            done
          else
            echo "No Staging flavor UI test results found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Prod Flavor
          echo "<details><summary>🔴 Prod Flavor UI Results (Click to expand)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "app/build/reports/androidTests/connected/prod/debug" ]; then
            echo "##### 📄 Prod Flavor UI Test Reports:" >> $GITHUB_STEP_SUMMARY
            for file in app/build/reports/androidTests/connected/prod/debug/**/*.xml; do
              if [ -f "$file" ]; then
                echo "###### File: $file" >> $GITHUB_STEP_SUMMARY
                echo '```xml' >> $GITHUB_STEP_SUMMARY
                head -100 "$file" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
              fi
            done
          else
            echo "No Prod flavor UI test results found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Build AAB (Dev)
        env:
          KEYSTORE_PATH: "your_keystore.jks"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
          VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
        run: |
          ./gradlew bundleDevRelease --stacktrace

      - name: Build AAB (Staging)
        env:
          KEYSTORE_PATH: "your_keystore.jks"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
          VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
        run: |
          ./gradlew bundleStagingRelease --stacktrace

      - name: Build AAB (Production)
        env:
          KEYSTORE_PATH: "your_keystore.jks"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
          VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
        run: |
          ./gradlew bundleProdRelease --stacktrace

      - name: Verify AABs exist
        run: |
          for flavor in dev staging prod; do
            AAB_PATH="app/build/outputs/bundle/${flavor}Release/app-${flavor}-release.aab"
            if [ ! -f "$AAB_PATH" ]; then
              echo "Error: AAB file not found at $AAB_PATH"
              echo "Listing build outputs:"
              find app/build/outputs -name "*.aab" -o -name "*.apk" || true
              exit 1
            fi
            echo "✅ AAB file found successfully: $AAB_PATH"
            ls -lh "$AAB_PATH"
          done

      - name: Upload AABs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-test-release-${{ steps.version.outputs.VERSION_CODE }}
          path: |
            app/build/outputs/bundle/devRelease/app-dev-release.aab
            app/build/outputs/bundle/stagingRelease/app-staging-release.aab
            app/build/outputs/bundle/prodRelease/app-prod-release.aab
          retention-days: 30

      - name: Build Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Flavors**: dev, staging, prod" >> $GITHUB_STEP_SUMMARY
          echo "- **Version Code**: ${{ steps.version.outputs.VERSION_CODE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version Name**: ${{ steps.version.outputs.VERSION_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Build successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All 3 AAB artifacts have been uploaded and can be downloaded from the workflow run." >> $GITHUB_STEP_SUMMARY

      - name: Notify build status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Build successful for all flavors (dev, staging, prod)"
            echo "Version: ${{ steps.version.outputs.VERSION_NAME }}"
            echo "Download AABs from workflow artifacts"
          else
            echo "❌ Build failed"
            echo "Check workflow logs for details"
            exit 1
          fi
