name: Android CI/CD - Test Build Only

on:
  push:
    branches:
      - main
      - test
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Build flavor (dev, staging, prod)'
        required: false
        default: 'prod'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  build-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/your_keystore.jks

      - name: Generate unique version code
        id: version
        run: |
          # Read current version from file or initialize
          if [ -f ".version" ]; then
            CURRENT_VERSION=$(cat .version)
            echo "Current version: $CURRENT_VERSION"
          else
            CURRENT_VERSION="1.0.0"
            echo "Initializing version: $CURRENT_VERSION"
          fi
          
          # Read current version code from file or initialize
          if [ -f ".versioncode" ]; then
            CURRENT_VERSION_CODE=$(cat .versioncode)
            echo "Current version code: $CURRENT_VERSION_CODE"
          else
            CURRENT_VERSION_CODE=0
            echo "Initializing version code: $CURRENT_VERSION_CODE"
          fi
          
          # Increment patch version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          
          # Increment version code
          NEW_VERSION_CODE=$((CURRENT_VERSION_CODE + 1))
          
          # Write new version and version code to files
          echo "$NEW_VERSION" > .version
          echo "$NEW_VERSION_CODE" > .versioncode
          
          echo "VERSION_CODE=$NEW_VERSION_CODE" >> $GITHUB_OUTPUT
          echo "VERSION_NAME=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Generated version code: $NEW_VERSION_CODE"
          echo "Generated version name: $NEW_VERSION"
      
      - name: Commit version file
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .version .versioncode
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Bump version to ${{ steps.version.outputs.VERSION_NAME }}"
            git push
            echo "Version files committed and pushed successfully"
          fi

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build AAB
        env:
          KEYSTORE_PATH: "your_keystore.jks"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
          VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
        run: |
          FLAVOR="${{ github.event.inputs.flavor || 'prod' }}"
          echo "Building flavor: $FLAVOR"
          case "$FLAVOR" in
            prod)
              ./gradlew bundleProdRelease --stacktrace
              ;;
            staging)
              ./gradlew bundleStagingRelease --stacktrace
              ;;
            dev)
              ./gradlew bundleDevRelease --stacktrace
              ;;
            *)
              echo "Unknown flavor: $FLAVOR"
              exit 1
              ;;
          esac

      - name: Verify AAB exists
        run: |
          FLAVOR="${{ github.event.inputs.flavor || 'prod' }}"
          FLAVOR_LOWER=$(echo "$FLAVOR" | tr '[:upper:]' '[:lower:]')
          AAB_PATH="app/build/outputs/bundle/${FLAVOR_LOWER}Release/app-${FLAVOR_LOWER}-release.aab"
          
          if [ ! -f "$AAB_PATH" ]; then
            echo "Error: AAB file not found at $AAB_PATH"
            echo "Listing build outputs:"
            find app/build/outputs -name "*.aab" -o -name "*.apk" || true
            exit 1
          fi
          echo "✅ AAB file found successfully"
          ls -lh "$AAB_PATH"

      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.flavor || 'prod' }}-release-${{ steps.version.outputs.VERSION_CODE }}
          path: app/build/outputs/bundle/${{ github.event.inputs.flavor || 'prod' }}Release/app-${{ github.event.inputs.flavor || 'prod' }}-release.aab
          retention-days: 30

      - name: Build Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Flavor**: ${{ github.event.inputs.flavor || 'prod' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version Code**: ${{ steps.version.outputs.VERSION_CODE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version Name**: ${{ steps.version.outputs.VERSION_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Build successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "AAB artifact has been uploaded and can be downloaded from the workflow run." >> $GITHUB_STEP_SUMMARY

      - name: Notify build status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Build successful for ${{ github.event.inputs.flavor || 'prod' }} flavor"
            echo "Version: ${{ steps.version.outputs.VERSION_NAME }}"
            echo "Download AAB from workflow artifacts"
          else
            echo "❌ Build failed"
            echo "Check workflow logs for details"
            exit 1
          fi
