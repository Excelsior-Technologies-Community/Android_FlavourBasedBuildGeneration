name: CD

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      flavour:
        description: 'Flavour to build (dev, staging, prod)'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:
  build-release:
    name: Build Release APKs
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks
      
      - name: Create keystore properties
        run: |
          echo "storeFile=keystore.jks" > keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties
          mv keystore.properties app/
      
      - name: Build dev release APK
        if: github.event.inputs.flavour == 'dev' || github.event_name == 'push'
        run: ./gradlew assembleDevRelease
      
      - name: Build staging release APK
        if: github.event.inputs.flavour == 'staging' || github.event_name == 'push'
        run: ./gradlew assembleStagingRelease
      
      - name: Build prod release APK
        if: github.event.inputs.flavour == 'prod' || github.event_name == 'push'
        run: ./gradlew assembleProdRelease
      
      - name: Upload dev release APK
        if: github.event.inputs.flavour == 'dev' || github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: dev-release-apk
          path: app/build/outputs/apk/dev/release/app-dev-release.apk
      
      - name: Upload staging release APK
        if: github.event.inputs.flavour == 'staging' || github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: staging-release-apk
          path: app/build/outputs/apk/staging/release/app-staging-release.apk
      
      - name: Upload prod release APK
        if: github.event.inputs.flavour == 'prod' || github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: prod-release-apk
          path: app/build/outputs/apk/prod/release/app-prod-release.apk

  deploy-github-releases:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/dev-release-apk/*.apk
            artifacts/staging-release-apk/*.apk
            artifacts/prod-release-apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
